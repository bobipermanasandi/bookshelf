<!DOCTYPE html>
<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookshelf App</title>

    <!-- Impor script kamu di sini -->
    <!-- Lampirkan `defer` jika pemanggilan dilakukan dalam <head> -->
    <link rel="stylesheet" href="styles/style.css">
    <script defer src="scripts/main.js"></script>
  </head>
  <body>
    <div style="position: fixed; top: -10%; left: -10%; width: 40%; height: 40%; background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, transparent 70%); z-index: -1; filter: blur(60px); pointer-events: none;"></div>

    <header>
      <h1>Bookshelf App</h1>
    </header>

    <main>
      <section>
        <h2>Tambah Buku Baru</h2>
        <form id="bookForm" data-testid="bookForm">
          <div class="input_group">
            <label for="bookFormTitle">Judul</label>
            <input id="bookFormTitle" type="text" placeholder="Masukkan judul buku" required data-testid="bookFormTitleInput" />
          </div>
          <div class="input_group">
            <label for="bookFormAuthor">Penulis</label>
            <input id="bookFormAuthor" type="text" placeholder="Masukkan nama penulis" required data-testid="bookFormAuthorInput" />
          </div>
          <div class="input_group">
            <label for="bookFormYear">Tahun</label>
            <input id="bookFormYear" type="number" placeholder="2024" required data-testid="bookFormYearInput" />
          </div>
          <div class="input_inline">
            <input
              id="bookFormIsComplete"
              type="checkbox"
              data-testid="bookFormIsCompleteCheckbox"
            />
            <label for="bookFormIsComplete">Selesai dibaca</label>
          </div>
          <button id="bookFormSubmit" type="submit" data-testid="bookFormSubmitButton">
            Simpan Buku ke Rak: <span>Belum selesai dibaca</span>
          </button>
        </form>
      </section>

      <section>
        <h2>Cari Buku</h2>
        <form id="searchBook" data-testid="searchBookForm">
          <input id="searchBookTitle" type="text" placeholder="Cari judul buku..." data-testid="searchBookFormTitleInput" />
          <button id="searchSubmit" type="submit" data-testid="searchBookFormSubmitButton">
            Cari
          </button>
        </form>
      </section>

      <section>
        <h2>📚 Belum selesai dibaca</h2>
        <div id="incompleteBookList" data-testid="incompleteBookList" class="book_list">
          <!-- Area rendering buku belum selesai -->
        </div>
      </section>

      <section>
        <h2>✅ Selesai dibaca</h2>
        <div id="completeBookList" data-testid="completeBookList" class="book_list">
          <!-- Area rendering buku selesai -->
        </div>
      </section>
    </main>
  </body>
</html>
